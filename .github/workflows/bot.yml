name: Run Discord Bot

on:
  workflow_dispatch:  # 手動実行
  schedule:
  - cron: '40 * * * *'  # 毎時00分に実行

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: Bot起動
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python bot.py
